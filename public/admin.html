<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — StudyBuddy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="bg-slate-50 dark:bg-gray-950 text-slate-800 dark:text-gray-100 min-h-screen">

  <div id="loading" class="flex items-center justify-center min-h-screen">
    <div class="text-slate-400 text-sm">Loading...</div>
  </div>

  <div id="app" class="hidden max-w-7xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold">Admin Panel</h1>
        <p class="text-slate-500 dark:text-gray-400 text-sm mt-1">StudyBuddy users</p>
      </div>
      <a href="/" class="text-sm text-slate-500 hover:text-slate-800 dark:hover:text-gray-200 transition">← App</a>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
      <div class="bg-white dark:bg-gray-900 rounded-xl p-4 border border-slate-200 dark:border-gray-800">
        <div class="text-2xl font-bold" id="stat-total">—</div>
        <div class="text-xs text-slate-500 mt-1">Total users</div>
      </div>
      <div class="bg-white dark:bg-gray-900 rounded-xl p-4 border border-slate-200 dark:border-gray-800">
        <div class="text-2xl font-bold text-yellow-500" id="stat-pro">—</div>
        <div class="text-xs text-slate-500 mt-1">Pro / VIP</div>
      </div>
      <div class="bg-white dark:bg-gray-900 rounded-xl p-4 border border-slate-200 dark:border-gray-800">
        <div class="text-2xl font-bold text-blue-500" id="stat-active">—</div>
        <div class="text-xs text-slate-500 mt-1">Active today</div>
      </div>
      <div class="bg-white dark:bg-gray-900 rounded-xl p-4 border border-slate-200 dark:border-gray-800">
        <div class="text-2xl font-bold text-green-500" id="stat-messages">—</div>
        <div class="text-xs text-slate-500 mt-1">Messages today</div>
      </div>
    </div>

    <!-- Search + Filter -->
    <div class="flex flex-col sm:flex-row gap-3 mb-5">
      <input id="search-input" type="text" placeholder="Search email..."
        class="flex-1 px-4 py-2 rounded-lg border border-slate-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      <select id="plan-filter"
        class="px-4 py-2 rounded-lg border border-slate-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <option value="">All plans</option>
        <option value="vip">VIP</option>
        <option value="pro">Pro</option>
        <option value="free">Free</option>
      </select>
    </div>

    <!-- Table -->
    <div class="bg-white dark:bg-gray-900 rounded-xl border border-slate-200 dark:border-gray-800 overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 dark:bg-gray-800 border-b border-slate-200 dark:border-gray-700">
          <tr>
            <th class="text-left px-4 py-3 font-medium text-slate-500 dark:text-gray-400">Email</th>
            <th class="text-left px-4 py-3 font-medium text-slate-500 dark:text-gray-400">Plan</th>
            <th class="text-right px-4 py-3 font-medium text-slate-500 dark:text-gray-400">Msgs today</th>
            <th class="text-right px-4 py-3 font-medium text-slate-500 dark:text-gray-400">Uploads today</th>
            <th class="text-left px-4 py-3 font-medium text-slate-500 dark:text-gray-400">Joined</th>
            <th class="text-left px-4 py-3 font-medium text-slate-500 dark:text-gray-400">Last seen</th>
          </tr>
        </thead>
        <tbody id="users-tbody" class="divide-y divide-slate-100 dark:divide-gray-800"></tbody>
      </table>
      <div id="empty-state" class="hidden text-center py-12 text-slate-400 text-sm">No users found.</div>
    </div>

    <div class="mt-4 text-xs text-slate-400 text-right" id="row-count"></div>
  </div>

  <div id="error-state" class="hidden flex items-center justify-center min-h-screen">
    <div class="text-center">
      <div class="text-red-500 font-medium mb-2">Access denied</div>
      <a href="/" class="text-sm text-slate-500 hover:underline">Go back</a>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    let allUsers = []

    function planBadge(plan) {
      if (plan === 'vip') return '<span class="px-2 py-0.5 rounded-full text-xs font-semibold bg-purple-100 text-purple-700 dark:bg-purple-900/40 dark:text-purple-300">VIP</span>'
      if (plan === 'pro') return '<span class="px-2 py-0.5 rounded-full text-xs font-semibold bg-yellow-100 text-yellow-700 dark:bg-yellow-900/40 dark:text-yellow-300">Pro</span>'
      return '<span class="px-2 py-0.5 rounded-full text-xs font-semibold bg-slate-100 text-slate-500 dark:bg-gray-800 dark:text-gray-400">Free</span>'
    }

    function escHtml(str) {
      return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    }

    function fmtDate(iso) {
      if (!iso) return '—'
      const d = new Date(iso)
      return d.toLocaleDateString('sr-RS', { day: '2-digit', month: '2-digit', year: '2-digit' })
    }

    function renderTable(users) {
      const tbody = document.getElementById('users-tbody')
      const empty = document.getElementById('empty-state')
      document.getElementById('row-count').textContent = `${users.length} user${users.length !== 1 ? 's' : ''}`

      if (!users.length) {
        tbody.innerHTML = ''
        empty.classList.remove('hidden')
        return
      }
      empty.classList.add('hidden')

      tbody.innerHTML = users.map(u => `
        <tr class="hover:bg-slate-50 dark:hover:bg-gray-800/50 transition">
          <td class="px-4 py-3 font-mono text-xs">${escHtml(u.email)}</td>
          <td class="px-4 py-3">${planBadge(u.plan)}</td>
          <td class="px-4 py-3 text-right tabular-nums">${u.messagestoday || 0}</td>
          <td class="px-4 py-3 text-right tabular-nums">${u.uploadstoday || 0}</td>
          <td class="px-4 py-3 text-slate-500 dark:text-gray-400">${fmtDate(u.created_at)}</td>
          <td class="px-4 py-3 text-slate-500 dark:text-gray-400">${fmtDate(u.last_sign_in_at)}</td>
        </tr>
      `).join('')
    }

    function applyFilters() {
      const q = document.getElementById('search-input').value.toLowerCase()
      const plan = document.getElementById('plan-filter').value
      const filtered = allUsers.filter(u => {
        const matchQ = !q || u.email.toLowerCase().includes(q)
        const matchPlan = !plan || u.plan === plan
        return matchQ && matchPlan
      })
      renderTable(filtered)
    }

    async function init() {
      const session = await requireSession()
      if (!session) return

      const token = getAccessToken()
      let data
      try {
        const res = await fetch('/api/admin/users', {
          headers: { Authorization: `Bearer ${token}` }
        })
        if (res.status === 403) {
          document.getElementById('loading').classList.add('hidden')
          document.getElementById('error-state').classList.remove('hidden')
          return
        }
        data = await res.json()
      } catch {
        document.getElementById('loading').classList.add('hidden')
        document.getElementById('error-state').classList.remove('hidden')
        return
      }

      allUsers = data.users || []

      // Stats
      const proCount = allUsers.filter(u => u.plan === 'pro' || u.plan === 'vip').length
      const activeCount = allUsers.filter(u => u.messagestoday > 0 || u.uploadstoday > 0).length
      const totalMsgs = allUsers.reduce((s, u) => s + (u.messagestoday || 0), 0)

      document.getElementById('stat-total').textContent = allUsers.length
      document.getElementById('stat-pro').textContent = proCount
      document.getElementById('stat-active').textContent = activeCount
      document.getElementById('stat-messages').textContent = totalMsgs

      renderTable(allUsers)

      document.getElementById('search-input').addEventListener('input', applyFilters)
      document.getElementById('plan-filter').addEventListener('change', applyFilters)

      document.getElementById('loading').classList.add('hidden')
      document.getElementById('app').classList.remove('hidden')
    }

    // Dark mode sync with main app
    if (localStorage.getItem('sb-theme') === 'dark' || (!localStorage.getItem('sb-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark')
    }

    init()
  </script>
</body>
</html>
