<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyBuddy</title>
  <script>(function(){const t=localStorage.getItem('sb-theme')||'light';if(t==='dark')document.documentElement.classList.add('dark')})()</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .accent-panel { background: #1F4E79; }
    .feature-item { display: flex; align-items: flex-start; gap: 10px; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-gray-900 flex">

  <!-- Left panel (hidden on small screens) -->
  <div class="hidden lg:flex accent-panel w-96 min-h-screen flex-col justify-between p-10 shrink-0">
    <div>
      <!-- Logo -->
      <div class="flex items-center gap-2.5 mb-12">
        <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center text-xl">📚</div>
        <div>
          <span class="text-white font-bold text-lg leading-none">StudyBuddy</span>
          <span class="block text-blue-300 text-[10px] font-semibold tracking-widest uppercase">BETA</span>
        </div>
      </div>

      <!-- Tagline -->
      <h1 id="login-tagline" class="text-white text-2xl font-bold leading-snug mb-3"></h1>
      <p id="login-subtitle" class="text-blue-200 text-sm leading-relaxed mb-10"></p>

      <!-- Features -->
      <div class="flex flex-col gap-5">
        <div class="feature-item">
          <span class="text-xl mt-0.5">🧠</span>
          <div>
            <p id="feat1-title" class="text-white text-sm font-semibold"></p>
            <p id="feat1-desc" class="text-blue-300 text-xs mt-0.5 leading-relaxed"></p>
          </div>
        </div>
        <div class="feature-item">
          <span class="text-xl mt-0.5">📄</span>
          <div>
            <p id="feat2-title" class="text-white text-sm font-semibold"></p>
            <p id="feat2-desc" class="text-blue-300 text-xs mt-0.5 leading-relaxed"></p>
          </div>
        </div>
        <div class="feature-item">
          <span class="text-xl mt-0.5">📋</span>
          <div>
            <p id="feat3-title" class="text-white text-sm font-semibold"></p>
            <p id="feat3-desc" class="text-blue-300 text-xs mt-0.5 leading-relaxed"></p>
          </div>
        </div>
        <div class="feature-item">
          <span class="text-xl mt-0.5">💬</span>
          <div>
            <p id="feat4-title" class="text-white text-sm font-semibold"></p>
            <p id="feat4-desc" class="text-blue-300 text-xs mt-0.5 leading-relaxed"></p>
          </div>
        </div>
        <div class="feature-item">
          <span class="text-xl mt-0.5">👥</span>
          <div>
            <p id="feat5-title" class="text-white text-sm font-semibold"></p>
            <p id="feat5-desc" class="text-blue-300 text-xs mt-0.5 leading-relaxed"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="flex-1 flex flex-col items-center justify-center p-6 relative">

    <!-- Theme toggle -->
    <button onclick="toggleTheme()" id="theme-btn"
      class="absolute top-4 right-4 w-9 h-9 rounded-full bg-white dark:bg-gray-800 border border-slate-200 dark:border-gray-700 flex items-center justify-center text-base shadow-sm hover:shadow-md transition">
    </button>
    <!-- Language toggle -->
    <button onclick="toggleLoginLang()" id="lang-btn"
      class="absolute top-4 right-16 h-9 px-2.5 rounded-full bg-white dark:bg-gray-800 border border-slate-200 dark:border-gray-700 flex items-center justify-center text-xs font-semibold text-slate-600 dark:text-gray-300 shadow-sm hover:shadow-md transition">
    </button>

    <!-- Mobile brand (visible only on small screens) -->
    <div class="flex lg:hidden items-center gap-2 mb-8">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center text-lg" style="background:#1F4E79">📚</div>
      <span class="text-slate-800 dark:text-gray-100 font-bold text-lg">StudyBuddy</span>
      <span class="text-[10px] font-semibold text-blue-500 bg-blue-50 dark:bg-blue-900/30 px-2 py-0.5 rounded-full">BETA</span>
    </div>

    <div class="w-full max-w-sm">
      <div class="text-center mb-6 lg:text-left">
        <h2 id="login-welcome" class="text-xl font-bold text-slate-800 dark:text-gray-100"></h2>
        <p id="login-welcome-sub" class="text-sm text-slate-500 dark:text-gray-400 mt-1"></p>
      </div>

      <!-- Card -->
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-slate-200 dark:border-gray-700 p-6">
        <!-- Tabs -->
        <div class="flex mb-6 bg-slate-100 dark:bg-gray-700 rounded-lg p-1">
          <button id="tab-login" onclick="showTab('login')"
            class="flex-1 py-1.5 text-sm font-medium rounded-md bg-white dark:bg-gray-600 shadow-sm text-slate-800 dark:text-gray-100 transition">
            Prijava
          </button>
          <button id="tab-register" onclick="showTab('register')"
            class="flex-1 py-1.5 text-sm font-medium rounded-md text-slate-500 dark:text-gray-400 transition">
            Registracija
          </button>
        </div>

        <!-- Login form -->
        <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-gray-200 mb-1">Email</label>
            <input id="login-email" type="email" required autocomplete="email"
              class="w-full border border-slate-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-slate-800 dark:text-gray-100 placeholder-slate-400 dark:placeholder-gray-500 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-[#1F4E79] focus:ring-2 focus:ring-[#1F4E79]/10 transition"
              placeholder="ana@etf.rs">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-gray-200 mb-1">Lozinka</label>
            <input id="login-password" type="password" required autocomplete="current-password"
              class="w-full border border-slate-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-slate-800 dark:text-gray-100 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-[#1F4E79] focus:ring-2 focus:ring-[#1F4E79]/10 transition">
          </div>
          <p id="login-error" class="text-red-500 text-sm hidden"></p>
          <button type="submit" id="login-btn"
            class="w-full text-white py-2.5 rounded-lg text-sm font-semibold transition" style="background:#1F4E79">
            Prijavi se
          </button>
          <button type="button" id="forgot-pw-link" onclick="showForgotPassword()"
            class="w-full text-xs text-slate-400 dark:text-gray-500 hover:text-slate-600 dark:hover:text-gray-300 transition text-center pt-1">
          </button>
        </form>

        <!-- Forgot password form -->
        <div id="form-forgot" class="hidden space-y-4">
          <div class="text-center mb-2">
            <p id="reset-title" class="text-sm font-medium text-slate-700 dark:text-gray-200"></p>
            <p id="reset-sub" class="text-xs text-slate-400 dark:text-gray-500 mt-1"></p>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-gray-200 mb-1">Email</label>
            <input id="forgot-email" type="email" required autocomplete="email"
              class="w-full border border-slate-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-slate-800 dark:text-gray-100 placeholder-slate-400 dark:placeholder-gray-500 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-[#1F4E79] focus:ring-2 focus:ring-[#1F4E79]/10 transition"
              placeholder="ana@etf.rs">
          </div>
          <p id="forgot-error" class="text-red-500 text-sm hidden"></p>
          <p id="forgot-success" class="text-green-600 dark:text-green-400 text-sm hidden"></p>
          <button onclick="handleForgotPassword()"
            id="forgot-btn" class="w-full text-white py-2.5 rounded-lg text-sm font-semibold transition" style="background:#1F4E79">
            Pošalji link
          </button>
          <button type="button" id="back-login-btn" onclick="showLoginForm()"
            class="w-full text-xs text-slate-400 dark:text-gray-500 hover:text-slate-600 dark:hover:text-gray-300 transition text-center pt-1">
          </button>
        </div>

        <!-- Set new password form (shown after clicking reset link) -->
        <div id="form-reset" class="hidden space-y-4">
          <div class="text-center mb-2">
            <p id="newpw-title" class="text-sm font-semibold text-slate-700 dark:text-gray-200"></p>
            <p id="newpw-sub" class="text-xs text-slate-400 dark:text-gray-500 mt-1"></p>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-gray-200 mb-1">Nova lozinka</label>
            <input id="reset-password" type="password" required minlength="8" autocomplete="new-password"
              class="w-full border border-slate-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-slate-800 dark:text-gray-100 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-[#1F4E79] focus:ring-2 focus:ring-[#1F4E79]/10 transition">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-gray-200 mb-1">Potvrdi lozinku</label>
            <input id="reset-confirm" type="password" required autocomplete="new-password"
              class="w-full border border-slate-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-slate-800 dark:text-gray-100 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-[#1F4E79] focus:ring-2 focus:ring-[#1F4E79]/10 transition">
          </div>
          <p id="reset-error" class="text-red-500 text-sm hidden"></p>
          <p id="reset-success" class="text-green-600 dark:text-green-400 text-sm hidden"></p>
          <button onclick="handleSetNewPassword()"
            id="reset-btn" class="w-full text-white py-2.5 rounded-lg text-sm font-semibold transition" style="background:#1F4E79">
            Sačuvaj lozinku
          </button>
        </div>

        <!-- Register form -->
        <form id="form-register" onsubmit="handleRegister(event)" class="space-y-4 hidden">
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-gray-200 mb-1">Email</label>
            <input id="reg-email" type="email" required autocomplete="email"
              class="w-full border border-slate-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-slate-800 dark:text-gray-100 placeholder-slate-400 dark:placeholder-gray-500 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-[#1F4E79] focus:ring-2 focus:ring-[#1F4E79]/10 transition"
              placeholder="ana@etf.rs">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-gray-200 mb-1">Lozinka</label>
            <input id="reg-password" type="password" required minlength="8" autocomplete="new-password"
              class="w-full border border-slate-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-slate-800 dark:text-gray-100 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-[#1F4E79] focus:ring-2 focus:ring-[#1F4E79]/10 transition">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-gray-200 mb-1">Potvrdi lozinku</label>
            <input id="reg-confirm" type="password" required autocomplete="new-password"
              class="w-full border border-slate-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-slate-800 dark:text-gray-100 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-[#1F4E79] focus:ring-2 focus:ring-[#1F4E79]/10 transition">
          </div>
          <p id="reg-error" class="text-red-500 text-sm hidden"></p>
          <p id="reg-success" class="text-green-600 dark:text-green-400 text-sm hidden"></p>
          <button type="submit" id="register-btn"
            class="w-full text-white py-2.5 rounded-lg text-sm font-semibold transition" style="background:#1F4E79">
            Napravi nalog
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/theme.js"></script>
  <script>
    let loginLang = localStorage.getItem('sb-lang') || 'sr'

    function applyLoginLang() {
      const t = I18N[loginLang]
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val }
      set('login-tagline', t.loginTagline)
      set('login-subtitle', t.loginSubtitle)
      set('feat1-title', t.feature1Title); set('feat1-desc', t.feature1Desc)
      set('feat2-title', t.feature2Title); set('feat2-desc', t.feature2Desc)
      set('feat3-title', t.feature3Title); set('feat3-desc', t.feature3Desc)
      set('feat4-title', t.feature4Title); set('feat4-desc', t.feature4Desc)
      set('feat5-title', t.feature5Title); set('feat5-desc', t.feature5Desc)
      set('login-welcome', t.welcomeBack)
      set('login-welcome-sub', t.welcomeSub)
      set('reset-title', t.resetPassword)
      set('reset-sub', t.resetPasswordSub)
      set('newpw-title', t.newPasswordTitle)
      set('newpw-sub', t.newPasswordSub)
      const tabLogin = document.getElementById('tab-login')
      const tabReg = document.getElementById('tab-register')
      if (tabLogin && !tabLogin.disabled) tabLogin.textContent = t.loginTab
      if (tabReg) tabReg.textContent = t.registerTab
      const loginBtn = document.getElementById('login-btn')
      if (loginBtn && !loginBtn.disabled) loginBtn.textContent = t.loginBtn
      const forgotBtn = document.getElementById('forgot-btn')
      if (forgotBtn && !forgotBtn.disabled) forgotBtn.textContent = t.sendLink
      const resetBtn = document.getElementById('reset-btn')
      if (resetBtn && !resetBtn.disabled) resetBtn.textContent = t.savePassword
      const registerBtn = document.getElementById('register-btn')
      if (registerBtn && !registerBtn.disabled) registerBtn.textContent = t.createAccount
      set('forgot-pw-link', t.forgotPassword)
      set('back-login-btn', '← ' + t.backToLogin)
      set('lang-btn', loginLang === 'sr' ? 'ENG' : 'SRP')
    }

    function toggleLoginLang() {
      loginLang = loginLang === 'sr' ? 'en' : 'sr'
      localStorage.setItem('sb-lang', loginLang)
      applyLoginLang()
    }

    function updateThemeBtn() {
      const btn = document.getElementById('theme-btn')
      if (btn) btn.textContent = getCurrentTheme() === 'dark' ? '☀️' : '🌙'
    }
    updateThemeBtn()

    function toggleTheme() {
      setTheme(getCurrentTheme() === 'dark' ? 'light' : 'dark')
      updateThemeBtn()
    }

    // If this is a password reset redirect, show the set-new-password form
    const hashParams = new URLSearchParams(window.location.hash.slice(1))
    if (hashParams.get('type') === 'recovery') {
      showResetForm()
    } else {
      ;(async () => {
        const session = await getSession()
        if (session) window.location.href = '/'
      })()
    }

    applyLoginLang()

    function showTab(tab) {
      const isLogin = tab === 'login'
      document.getElementById('form-login').classList.toggle('hidden', !isLogin)
      document.getElementById('form-register').classList.toggle('hidden', isLogin)
      const activeClass = 'flex-1 py-1.5 text-sm font-medium rounded-md bg-white dark:bg-gray-600 shadow-sm text-slate-800 dark:text-gray-100 transition'
      const inactiveClass = 'flex-1 py-1.5 text-sm font-medium rounded-md text-slate-500 dark:text-gray-400 transition'
      document.getElementById('tab-login').className = isLogin ? activeClass : inactiveClass
      document.getElementById('tab-register').className = isLogin ? inactiveClass : activeClass
    }

    async function handleLogin(e) {
      e.preventDefault()
      const t = I18N[loginLang]
      const btn = document.getElementById('login-btn')
      const errEl = document.getElementById('login-error')
      btn.disabled = true
      btn.textContent = t.loggingIn
      errEl.classList.add('hidden')

      const { error } = await signIn(
        document.getElementById('login-email').value,
        document.getElementById('login-password').value
      )

      if (error) {
        errEl.textContent = t.authError
        errEl.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = t.loginBtn
      } else {
        window.location.href = '/'
      }
    }

    function showForgotPassword() {
      document.getElementById('form-login').classList.add('hidden')
      document.getElementById('form-register').classList.add('hidden')
      document.getElementById('form-forgot').classList.remove('hidden')
      document.getElementById('forgot-email').focus()
    }

    function showLoginForm() {
      document.getElementById('form-forgot').classList.add('hidden')
      document.getElementById('form-login').classList.remove('hidden')
    }

    async function handleForgotPassword() {
      const t = I18N[loginLang]
      const btn = document.getElementById('forgot-btn')
      const errEl = document.getElementById('forgot-error')
      const successEl = document.getElementById('forgot-success')
      const email = document.getElementById('forgot-email').value.trim()

      if (!email) return
      errEl.classList.add('hidden')
      successEl.classList.add('hidden')
      btn.disabled = true
      btn.textContent = t.sendingReset

      if (!sb) await initAuth()
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/login.html'
      })

      if (error) {
        errEl.textContent = error.message
        errEl.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = t.sendLink
      } else {
        successEl.textContent = t.resetPasswordSent
        successEl.classList.remove('hidden')
        btn.disabled = true
        btn.textContent = t.sentLink
      }
    }

    function showResetForm() {
      document.getElementById('form-login').classList.add('hidden')
      document.getElementById('form-register').classList.add('hidden')
      document.getElementById('form-forgot').classList.add('hidden')
      document.getElementById('form-reset').classList.remove('hidden')
      document.querySelector('.flex.mb-6').classList.add('hidden')
    }

    async function handleSetNewPassword() {
      const t = I18N[loginLang]
      const btn = document.getElementById('reset-btn')
      const errEl = document.getElementById('reset-error')
      const successEl = document.getElementById('reset-success')
      const password = document.getElementById('reset-password').value
      const confirm = document.getElementById('reset-confirm').value

      errEl.classList.add('hidden')
      successEl.classList.add('hidden')

      if (password !== confirm) {
        errEl.textContent = t.passwordMismatch
        errEl.classList.remove('hidden')
        return
      }

      btn.disabled = true
      btn.textContent = t.savingPassword

      if (!sb) await initAuth()
      await sb.auth.getSession()
      const { error } = await sb.auth.updateUser({ password })

      if (error) {
        errEl.textContent = error.message
        errEl.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = t.savePassword
      } else {
        successEl.textContent = t.resetSuccessMsg
        successEl.classList.remove('hidden')
        btn.disabled = true
        setTimeout(() => { window.location.href = '/' }, 2000)
      }
    }

    async function handleRegister(e) {
      e.preventDefault()
      const t = I18N[loginLang]
      const btn = document.getElementById('register-btn')
      const errEl = document.getElementById('reg-error')
      const successEl = document.getElementById('reg-success')
      const password = document.getElementById('reg-password').value
      const confirm = document.getElementById('reg-confirm').value

      errEl.classList.add('hidden')
      successEl.classList.add('hidden')

      if (password !== confirm) {
        errEl.textContent = t.passwordMismatch
        errEl.classList.remove('hidden')
        return
      }

      btn.disabled = true
      btn.textContent = t.creatingAccount

      const { error } = await signUp(
        document.getElementById('reg-email').value,
        password
      )

      if (error) {
        errEl.textContent = error.message
        errEl.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = t.createAccount
      } else {
        successEl.textContent = t.confirmEmailMsg
        successEl.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = t.createAccount
      }
    }
  </script>
</body>
</html>
